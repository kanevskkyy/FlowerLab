server {
    listen 80;
    server_name flowerlab-vlada.com.ua www.flowerlab-vlada.com.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flowerlab-vlada.com.ua www.flowerlab-vlada.com.ua;

    ssl_certificate /etc/letsencrypt/live/flowerlab-vlada.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowerlab-vlada.com.ua/privkey.pem;

    # Проксі на frontend Docker контейнер (порт 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name api.flowerlab-vlada.com.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.flowerlab-vlada.com.ua;

    ssl_certificate /etc/letsencrypt/live/flowerlab-vlada.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowerlab-vlada.com.ua/privkey.pem;

    # Проксі на Gateway Docker контейнер (порт 5000)
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }
}
