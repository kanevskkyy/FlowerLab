name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION_DAYS }}
          CLOUDINARY_CLOUDNAME: ${{ secrets.CLOUDINARY_CLOUDNAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          BOT_ID: ${{ secrets.BOT_ID }}
          USER_ID: ${{ secrets.USER_ID }}
          LIQPAY_PUBLIC_KEY: ${{ secrets.LIQPAY_PUBLIC_KEY }}
          LIQPAY_PRIVATE_KEY: ${{ secrets.LIQPAY_PRIVATE_KEY }}
          GMAIL_FROM_EMAIL: ${{ secrets.GMAIL_FROM_EMAIL }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,RABBITMQ_USER,RABBITMQ_PASSWORD,JWT_SECRET,JWT_ISSUER,JWT_AUDIENCE,JWT_ACCESS_TOKEN_EXPIRATION_MINUTES,JWT_REFRESH_TOKEN_EXPIRATION_DAYS,CLOUDINARY_CLOUDNAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,BOT_ID,USER_ID,LIQPAY_PUBLIC_KEY,LIQPAY_PRIVATE_KEY,GMAIL_FROM_EMAIL,GMAIL_FROM_NAME,GMAIL_APP_PASSWORD,VITE_API_URL
          script: |
            cd /var/www/FlowerLab

            echo "⬇️  Pulling latest code..."
            git pull origin main

            echo "📝  Writing .env file..."
            cat > .env << EOF
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            RABBITMQ_USER=$RABBITMQ_USER
            RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD
            JWT_SECRET=$JWT_SECRET
            JWT_ISSUER=$JWT_ISSUER
            JWT_AUDIENCE=$JWT_AUDIENCE
            JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=$JWT_ACCESS_TOKEN_EXPIRATION_MINUTES
            JWT_REFRESH_TOKEN_EXPIRATION_DAYS=$JWT_REFRESH_TOKEN_EXPIRATION_DAYS
            CLOUDINARY_CLOUDNAME=$CLOUDINARY_CLOUDNAME
            CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
            BOT__ID=$BOT_ID
            USER__ID=$USER_ID
            LIQPAY_PUBLIC_KEY=$LIQPAY_PUBLIC_KEY
            LIQPAY_PRIVATE_KEY=$LIQPAY_PRIVATE_KEY
            LIQPAY_SERVER_URL=https://api.flowerlab-vlada.com.ua/api/orders/liqpay-callback
            LIQPAY_SUCCESS_URL=https://flowerlab-vlada.com.ua/order-success
            LIQPAY_IS_SANDBOX=false
            GMAIL__FROM_EMAIL=$GMAIL_FROM_EMAIL
            GMAIL__FROM_NAME=$GMAIL_FROM_NAME
            GMAIL__APP_PASSWORD=$GMAIL_APP_PASSWORD
            VITE_API_URL=$VITE_API_URL
            EOF
            
            # Копіюємо .env також у папку фронтенду для білду
            cp .env my-react-app/.env


            echo "🐳  Restarting Docker services..."
            docker compose up -d --build

            echo "✅  Deploy complete!"
