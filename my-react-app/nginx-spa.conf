server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — всі маршрути віддаємо index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статичні файли — кешуємо
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
